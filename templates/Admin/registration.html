<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAssist | Admin Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/registration.css') }}">
</head>
<body>
    <div class="registration-container">
        <!-- Header -->
        <div class="reg-header">
            <div class="reg-logo">M</div>
            <h1>Admin Registration</h1>
            <p>Complete your admin profile setup</p>
        </div>

        <!-- Progress Steps -->
        <div class="progress-steps">
            <div class="step active" data-step="1">
                <div class="step-number">1</div>
                <div class="step-label">Personal Info</div>
            </div>
            <div class="step" data-step="2">
                <div class="step-number">2</div>
                <div class="step-label">Hospital Info</div>
            </div>
            <div class="step" data-step="3">
                <div class="step-number">3</div>
                <div class="step-label">Admin Role</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Form Container -->
        <div class="form-container">
            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Registration successful! Redirecting to dashboard...</span>
            </div>

            <!-- Step 1: Personal Information -->
            <form class="form-section active" id="step1Form">
                <h3 class="section-title">
                    <i class="fas fa-user-circle"></i>
                    Personal Information
                </h3>

                <div class="form-group">
                    <label class="form-label required">Full Name</label>
                    <input type="text" class="input-field" id="fullName" placeholder="Enter your full name" required>
                    <div class="error-message" id="fullNameError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label required">Email Address</label>
                    <div class="input-with-icon">
                        <input type="email" class="input-field" id="email" placeholder="admin@hospital.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label required">Phone Number</label>
                    <div class="input-with-icon">
                        <input type="tel" class="input-field" id="phone" placeholder="+91 1234567890" required>
                        <i class="fas fa-phone input-icon"></i>
                    </div>
                    <div class="error-message" id="phoneError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label required">Date of Birth</label>
                    <input type="date" class="input-field" id="dob" required>
                    <div class="error-message" id="dobError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label required">Gender</label>
                    <select class="select-field" id="gender" required>
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                        <option value="prefer_not_to_say">Prefer not to say</option>
                    </select>
                    <div class="error-message" id="genderError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label required">Address</label>
                    <input type="text" class="input-field" id="address" placeholder="Enter your complete address" required>
                    <div class="error-message" id="addressError"></div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <button type="button" class="btn btn-primary" id="nextBtn1">
                        Next <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>

            <!-- Step 2: Hospital Information -->
            <form class="form-section" id="step2Form">
                <h3 class="section-title">
                    <i class="fas fa-hospital"></i>
                    Hospital Information
                </h3>

                <div class="hospital-card">
                    <h4><i class="fas fa-info-circle"></i> Hospital Details</h4>
                    
                    <div class="form-group">
                        <label class="form-label required">Hospital Name</label>
                        <input type="text" class="input-field" id="hospitalName" placeholder="Enter hospital name" required>
                        <div class="error-message" id="hospitalNameError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label required">Hospital Type</label>
                        <select class="select-field" id="hospitalType" required>
                            <option value="">Select Type</option>
                            <option value="general">General Hospital</option>
                            <option value="specialty">Specialty Hospital</option>
                            <option value="clinic">Clinic</option>
                            <option value="research">Research Institute</option>
                            <option value="other">Other</option>
                        </select>
                        <div class="error-message" id="hospitalTypeError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label required">Hospital Address</label>
                        <input type="text" class="input-field" id="hospitalAddress" placeholder="Enter hospital address" required>
                        <div class="error-message" id="hospitalAddressError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label required">Hospital Contact</label>
                        <div class="input-with-icon">
                            <input type="tel" class="input-field" id="hospitalContact" placeholder="Hospital contact number" required>
                            <i class="fas fa-phone input-icon"></i>
                        </div>
                        <div class="error-message" id="hospitalContactError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label required">License Number</label>
                        <input type="text" class="input-field" id="licenseNumber" placeholder="Enter hospital license number" required>
                        <div class="error-message" id="licenseNumberError"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="backBtn2">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <button type="button" class="btn btn-primary" id="nextBtn2">
                        Next <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>

            <!-- Step 3: Admin Role & Permissions -->
            <form class="form-section" id="step3Form">
                <h3 class="section-title">
                    <i class="fas fa-user-shield"></i>
                    Admin Role & Permissions
                </h3>

                <div class="form-group">
                    <label class="form-label required">Admin Role</label>
                    <select class="select-field" id="adminRole" required>
                        <option value="">Select Admin Role</option>
                        <option value="super_admin">Super Admin</option>
                        <option value="hospital_admin">Hospital Admin</option>
                        <option value="inventory_admin">Inventory Admin</option>
                        <option value="patient_admin">Patient Admin</option>
                        <option value="reports_admin">Reports Admin</option>
                    </select>
                    <div class="error-message" id="adminRoleError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label required">Department</label>
                    <select class="select-field" id="department" required>
                        <option value="">Select Department</option>
                        <option value="administration">Administration</option>
                        <option value="inventory">Inventory Management</option>
                        <option value="patient_care">Patient Care</option>
                        <option value="pharmacy">Pharmacy</option>
                        <option value="laboratory">Laboratory</option>
                        <option value="radiology">Radiology</option>
                        <option value="billing">Billing & Finance</option>
                    </select>
                    <div class="error-message" id="departmentError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label required">Password</label>
                    <input type="password" class="input-field" id="password" placeholder="Create a password" required>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label required">Permissions</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="perm_inventory" value="inventory_management" checked>
                            <label for="perm_inventory">Inventory Management</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="perm_patients" value="patient_management" checked>
                            <label for="perm_patients">Patient Management</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="perm_reports" value="reports" checked>
                            <label for="perm_reports">Reports & Analytics</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="perm_users" value="user_management">
                            <label for="perm_users">User Management</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="perm_settings" value="system_settings">
                            <label for="perm_settings">System Settings</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="perm_billing" value="billing">
                            <label for="perm_billing">Billing & Finance</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Employee ID</label>
                    <input type="text" class="input-field" id="employeeId" placeholder="Enter employee ID">
                </div>

                <div class="form-group">
                    <label class="form-label">Admin Notes</label>
                    <textarea class="input-field" id="adminNotes" rows="3" placeholder="Any additional notes or special instructions..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="backBtn3">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <button type="button" class="btn btn-success" id="submitBtn">
                        <i class="fas fa-check-circle"></i> Complete Registration
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='admin/js/registration.js') }}"></script>
</body>
</html>
